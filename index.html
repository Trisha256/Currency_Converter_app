<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="card">
        <h1 class="title">Currency Converter</h1>

        <div class="row">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal" aria-label="Amount to convert">
        </div>

        <div class="row two-cols">
            <div>
                <label for="fromCurrency">From</label>
                <select id="fromCurrency" aria-label="From currency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="AED">AED</option>
                    <option value="GBP">GBP</option>
                    <option value="UGX">UGX</option>
                </select>
            </div>

            <div>
                <label for="toCurrency">To</label>
                <select id="toCurrency" aria-label="To currency">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="AED">AED</option>
                    <option value="GBP">GBP</option>
                    <option value="UGX">UGX</option>
                </select>
            </div>
        </div>

        <div class="row actions">
            <button id="swapBtn" type="button" aria-label="Swap currencies">↔ Swap</button>
            <button id="convertBtn" type="button">Convert</button>
        </div>

        <div id="status" class="status" aria-live="polite"></div>

        <div id="resultCard" class="result-card" hidden>
            <div id="resultText" class="result-text"></div>
            <div id="rateText" class="rate-text"></div>
            <div id="dateText" class="date-text"></div>
        </div>

        <div id="history" class="history" aria-live="polite"></div>
    </main>

    <script src="script.js"></script>

</body>
</html>
